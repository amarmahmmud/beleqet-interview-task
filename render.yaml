databases:
  - name: beleqet-db
    databaseName: beleqet
    user: beleqet_user

redis:
  - name: beleqet-redis
    ipAllowList: []

services:
  - type: web
    name: beleqet-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npx prisma:deploy && npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beleqet-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: beleqet-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"

  - type: web
    name: beleqet-frontend
    env: node
    rootDir: beleqet-jobs-nextjs
    buildCommand: npm install && npm run build
    startCommand: npx serve -s .next
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://beleqet-backend.onrender.com
