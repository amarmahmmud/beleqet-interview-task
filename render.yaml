databases:
  - name: beleqet-db
    databaseName: beleqet
    user: beleqet_user
    plan: free

services:
  - type: redis
    name: beleqet-redis
    ipAllowList: []
    plan: free

  - type: web
    name: beleqet-backend
    env: node
    rootDir: backend
    buildCommand: npm run prisma:generate && npm run build
    startCommand: npx prisma:deploy && npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beleqet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: beleqet-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"

  - type: web
    name: beleqet-frontend
    env: node
    rootDir: beleqet-jobs-nextjs
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://beleqet-backend.onrender.com
      - key: PORT
        value: "3000"
